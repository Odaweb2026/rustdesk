name: Build Suporte Remoto S21 - Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install vcpkg deps
        run: |
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic

      - name: Apply S21 custom config
        shell: pwsh
        run: |
          (Get-Content src/common.rs) -replace 'rs-ny.rustdesk.com', '100.83.110.44' | Set-Content src/common.rs
          (Get-Content src/common.rs) -replace 'RustDesk', 'Suporte Remoto S21' | Set-Content src/common.rs

      - name: Build Windows
        shell: pwsh
        run: python3 build.py --flutter
        env:
          RENDEZVOUS_SERVER: 100.83.110.44
          RS_PUB_KEY: 9qOwriHD7dA05QPpvw7WF5MNMclXdAXpyMMSzDp+6Y4=
          VCPKG_ROOT: C:\vcpkg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suporte-remoto-s21
          path: flutter/build/windows/runner/Release/
